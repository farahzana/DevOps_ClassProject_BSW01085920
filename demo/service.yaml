apiVersion: v1
kind: Service
metadata:
  name: student-app-service
spec:
  type: NodePort
  selector:
    app: student-app
  ports:
    - protocol: TCP
      port: 8080      # Port inside the cluster
      targetPort: 8080 # Port your Java app is listening on
      nodePort: 30001  # Port you will use in your browser (must be 30000-32767)